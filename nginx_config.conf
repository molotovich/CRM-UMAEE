# Ejemplo de configuración Nginx para CRM UMAEE
# Ubicación típica: /etc/nginx/sites-available/crm-umaee

server {
    listen 80;
    server_name crm.umaee.com; # Cambiar por tu dominio o IP pública

    # Configuración de logs
    access_log /var/log/nginx/crm_access.log;
    error_log /var/log/nginx/crm_error.log;

    # 1. Servir archivos estáticos directamente (HTML, JS, CSS, Imágenes)
    # Esto es mucho más rápido que pasarlos por Gunicorn
    location / {
        root /var/www/CRM-UMAEE/backend/static; # Ajustar a la ruta real en el servidor
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy inverso para la API de Flask (Gunicorn)
    location /api {
        proxy_pass http://127.0.0.1:5001; # Dirección donde corre Gunicorn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuración de límites de subida (para que coincida con .env)
    client_max_body_size 10M;

    # Opcional: Configuración para Gzip (compresión)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
