# Ejemplo de configuración Apache para CRM UMAEE
# Ubicación típica: /etc/apache2/sites-available/crm-umaee.conf

<VirtualHost *:80>
    ServerName crm.umaee.com
    ServerAdmin admin@umaee.com

    # Logs de Apache
    ErrorLog ${APACHE_LOG_DIR}/crm_error.log
    CustomLog ${APACHE_LOG_DIR}/crm_access.log combined

    # 1. Servir archivos estáticos directamente (Frontend)
    # Ajustar la ruta absoluta a /var/www/CRM-UMAEE/backend/static
    DocumentRoot /var/www/CRM-UMAEE/backend/static
    
    <Directory "/var/www/CRM-UMAEE/backend/static">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # 2. Configuración de Proxy Inverso para la API y Gunicorn
    # Requiere habilitar mod_proxy y mod_proxy_http (sudo a2enmod proxy proxy_http)
    ProxyPreserveHost On
    
    # Redirigir todas las peticiones /api a Gunicorn (corriendo en 5001)
    ProxyPass /api http://127.0.0.1:5001/api
    ProxyPassReverse /api http://127.0.0.1:5001/api

    # 3. Manejo de SPA (Single Page Application)
    # Redirige rutas que no existen a index.html para que el JS se encargue
    <Directory "/var/www/CRM-UMAEE/backend/static">
        RewriteEngine on
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . index.html [L]
    </Directory>

</VirtualHost>
